# SITE CONFIGURATION
baseurl: "" # the subpath of your site, e.g. /blog/
url: "http://wende.github.io" # the base hostname & protocol for your site

# THEME-SPECIFIC CONFIGURATION
theme:
  # Meta
  title: I hate Monads
  avatar: avatar.png
  gravatar: "502d830e6e95833ce07efc51f89a38e6"# Email MD5 hash
  description: "How to function in a [dys]functional world" # used by search engines

  # Header and footer text
  header_text: >
     <p id="quote">How to function in a [dys]functional world</p>

  header_text_feature_image:
  footer_text: >
   Powered by <a href="http://jekyllrb.com">Jekyll</a> with <a href="https://rohanchandra.github.io/project/type/">Type Theme</a>

  # Icons
  rss: false
  email_address: "chris@neontree.pl"# Full email address, e.g. "sam@example.com"
  behance:
  bitbucket:
  dribbble:
  facebook:
  flickr:
  github: "wende"
  google_plus: "https://plus.google.com/+KrzysztofWendeIraasta"
  instagram:
  linkedin:  # Full URL
  pinterest:
  reddit:
  soundcloud:
  stack_exchange: "http://stackoverflow.com/users/2086804/krzysztof-wende" # Full URL
  steam:
  tumblr: 
  twitter: "iraasta"
  wordpress:
  youtube: 

  # Scripts
  google_analytics: "UA-56241713-9" # Tracking ID, e.g. "UA-000000-01"
  disqus_shortname: "iraasta"
  katex: true # Enable if using math markup

  # Localization strings
  str_follow_on: "Follow on"
  str_rss_follow: "Follow RSS feed"
  str_email: "Email"
  str_next: "Next"
  str_prev: "Prev"
  str_continue_reading: "Continue reading"

  # Colours, typography and padding
  # Open the "_sass > base" folder, and open "_variables.scss"
  google_fonts: "Source+Sans+Pro:400,700,700italic,400italic"
  
  # Post navigation
  post_navigation: true

# PAGINATION
paginate: 5
paginate_path: "blog/page:num"

# BUILD SETTINGS
markdown: kramdown
highlighter: pygments
sass:
  sass_dir: _sass
  style: :compressed
gems:
    - jekyll-sitemap
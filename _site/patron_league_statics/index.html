<head>

    <link rel="apple-touch-icon" href="assets/images/favicon/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/images/favicon/apple-touch-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="114x114" href="assets/images/favicon/apple-touch-icon-114x114.png">

    <!-- Bootstrap core CSS -->
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plugins -->
    <link href="assets/css/awesome-bootstrap-checkbox.css" rel="stylesheet">
    <link href="assets/css/font-awesome.min.css" rel="stylesheet">
    <link href="assets/css/ionicons.min.css" rel="stylesheet">

<body>

<!-- PRELOADER -->
<div class="page-loader">
    <div class="loader">Loading...</div>
</div>
<!-- /PRELOADER -->

<!-- WRAPPER -->
<div class="wrapper">

    <section class="module">
        <div class="container">
            <div class="row">
                <div
                        class="col-xs-12 col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3 col-lg-4 col-lg-offset-4 btn btn-d loginpage">

                    <form action="/auth/identity/callback" method="post">
                        <div class="input-group input-group-lg m-t-30">
                            <span class="input-group-addon" id="login-email-address"><i class="fa fa-user"></i></span>
                            <input type="email" class="form-control" placeholder="E-mail address"
                                   aria-describedby="login-email-address" name="email">
                        </div>

                        <div class="input-group input-group-lg m-t-10">
                            <span class="input-group-addon" id="login-password"><i class="fa fa-unlock"></i></span>
                            <input type="password" class="form-control" placeholder="Password"
                                   aria-describedby="login-password" name="password">
                        </div>

                        <a class="btn btn-link col-xs-12 text-left" href="forgot.html">Forgot password?</a>

                        <div class="btn btn-lg checkbox checkbox-inline col-xs-12 text-left">
                            <input type="checkbox" class="styled" id="remember-me">
                            <label for="remember-me"> Remember my password</label>
                        </div>

                        <div class="text-center col-xs-12 m-t-20">
                            <button type="submit" class="btn btn-default btn-lg" aria-label="Login">
                                <span class="fa fa-sign-in" aria-hidden="true"></span> Login
                            </button>
                        </div>
                        <a class="btn btn-link col-xs-12 text-center m-t-10 m-b-20" href="register.html">Create new account</a>
                    </form>

                </div>
            </div>
        </div>
    </section>

</div>
<!-- /WRAPPER -->

<!-- SCROLLTOP -->
<div class="scroll-up">
    <a href="#totop"><i class="fa fa-angle-double-up"></i></a>

<script src="assets/js/custom.js"></script>

</body>
</html>

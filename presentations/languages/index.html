# Type system

- Dynamic (aka Weak)
```dynamic 
  [] == 0             #=> true
  "0" == !undefined   #=> false
  "0" == undefined    #=> false
  [] == ![]           #=> true
  0  == !0            #=> false
  "0" == !"0"         #=> true
```
- Static (aka Strong)
```java 
  ArrayList<ArrayList<System.Nullable<Integer>>> builder = new ArrayList<ArrayList<System.Nullable<Integer>>>() 
```

# Imperative
```
var dogsWithOwners = []
var dog, owner

for(var di=0; di < dogs.length; di++) {
  dog = dogs[di]

  for(var oi=0; oi < owners.length; oi++) {
    owner = owners[oi]
    if (owner && dog.owner_id == owner.id) {
      dogsWithOwners.push({
        dog: dog,
        owner: owner
      })
    }
  }}
}
```
